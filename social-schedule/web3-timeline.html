<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><title>🌐 Web3 排期</title></head>
<body>
<h1>Web3 排期</h1>
<div id="app"></div>
<script>
const LS_KEY = 'web3_v1_slots';
localStorage.removeItem(LS_KEY);
const data = {};
function render() {
  const count = Object.keys(data).length;
  document.getElementById('app').innerHTML = count + ' 条排期（空模板）';
  document.title = '🌐 Web3 排期 · ' + count + '条';
}
render();
</script>
</body></html>
